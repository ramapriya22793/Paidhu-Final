name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    name: Deploy Frontend (paidhu.com)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Run Vercel build (generate .vercel/output)
        working-directory: ./frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_C2b0pSd5lkEwPzlzMXiZAQ1S
          VERCEL_PROJECT_ID: prj_HqL7cAuq6qR3bL94sLR3w1Wd58t3
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Copy prebuilt output to root
        run: cp -r frontend/.vercel/output .vercel/output

      - name: Deploy to Vercel Production (paidhu.com)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_C2b0pSd5lkEwPzlzMXiZAQ1S
          VERCEL_PROJECT_ID: prj_HqL7cAuq6qR3bL94sLR3w1Wd58t3
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Backend to Vercel (Production)
        working-directory: ./server
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_C2b0pSd5lkEwPzlzMXiZAQ1S
          VERCEL_PROJECT_ID: prj_fSwlGoKHjgTeFjyCLENapBP6lk3j
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
